name: News Sentiment Analysis

on:
  schedule:
    # 9:30 AM ET = 13:30 UTC (EDT, UTC-4). Monday + Thursday only (2x/week).
    - cron: '30 13 * * 1'
    - cron: '30 13 * * 4'
  workflow_dispatch:

jobs:
  news-sentiment:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Run news sentiment analysis
        env:
          # Security: all credentials injected via GitHub Actions secrets only.
          # No credentials are written to news.json or any tracked file.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python bot/news_sentiment.py

      - name: Commit news data
        run: |
          git config user.name "TradeQuest Bot"
          git config user.email "actions@github.com"
          git add data/news.json
          if git diff --staged --quiet; then
            echo "No news changes to commit."
          else
            git commit -m "news: sentiment update $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi
