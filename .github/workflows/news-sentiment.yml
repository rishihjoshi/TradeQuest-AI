name: News Sentiment Analysis

on:
  schedule:
    # 9:30 AM ET = 13:30 UTC (EDT, UTC-4). Runs after market open each weekday.
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  news-sentiment:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Run news sentiment analysis
        env:
          # Security: all credentials injected via GitHub Actions secrets only.
          # No credentials are written to news.json or any tracked file.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python bot/news_sentiment.py

      - name: Commit news data
        run: |
          git config user.name "TradeQuest Bot"
          git config user.email "actions@github.com"
          git add data/news.json
          if git diff --staged --quiet; then
            echo "No news changes to commit."
          else
            git commit -m "news: sentiment update $(date +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi
