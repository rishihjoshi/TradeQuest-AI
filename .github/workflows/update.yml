name: Update Portfolio Data

on:
  schedule:
    # 4:30 PM ET (21:30 UTC) every weekday — 30 min after NYSE close
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated JSON

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Run portfolio updater
        run: python bot/update.py

      - name: Commit and push if data changed
        run: |
          git config user.name "TradeQuest Bot"
          git config user.email "actions@github.com"
          git add data/portfolio.json
          if git diff --staged --quiet; then
            echo "No changes to portfolio data."
          else
            git commit -m "bot: update portfolio $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
