name: Day Start — Pre-Market Agent

on:
  schedule:
    # 9:00 AM ET = 14:00 UTC (covers both EDT UTC-4 and EST UTC-5 with a safe offset)
    - cron: '0 14 * * 1-5'   # Mon–Fri only
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type override'
        required: false
        default: 'day_start'

jobs:
  day-start:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Fetch calendar enrichment (earnings + macro + breadth)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python bot/enrich.py

      - name: Run pre-market agent
        env:
          RUN_TYPE:            ${{ github.event.inputs.run_type || 'day_start' }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_ACCOUNT_NAME: ${{ secrets.ALPACA_ACCOUNT_NAME }}
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
        run: python bot/agent.py

      - name: Commit agent log
        run: |
          git config user.name "TradeQuest Bot"
          git config user.email "actions@github.com"
          git add data/agent_log.json data/enrichment.json
          if git diff --staged --quiet; then
            echo "No log changes."
          else
            git commit -m "agent[day-start]: $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
