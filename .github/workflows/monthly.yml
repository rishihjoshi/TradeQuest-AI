name: Monthly Rebalance — Full Rescreen + Agent

on:
  schedule:
    # 1st of every month at 4:30 PM ET (21:30 UTC)
    - cron: '30 21 1 * *'
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type override'
        required: false
        default: 'monthly'

jobs:
  monthly-rebalance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Step 1 — Full S&P 500 re-screen + Alpaca data update
        env:
          ALPACA_ACCOUNT_NAME: ${{ secrets.ALPACA_ACCOUNT_NAME }}
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
        run: python bot/update.py

      - name: Step 2 — Monthly rebalance agent (Claude decision layer)
        env:
          RUN_TYPE:            ${{ github.event.inputs.run_type || 'monthly' }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_ACCOUNT_NAME: ${{ secrets.ALPACA_ACCOUNT_NAME }}
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
        run: python bot/agent.py

      - name: Commit updated data and agent log
        run: |
          git config user.name "TradeQuest Bot"
          git config user.email "actions@github.com"
          git add data/portfolio.json data/agent_log.json
          if git diff --staged --quiet; then
            echo "No changes after monthly rebalance."
          else
            git commit -m "agent[monthly]: rebalance $(date +'%Y-%m-%d')"
            git push
          fi
