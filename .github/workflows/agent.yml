name: TradeQuest Agent

on:
  schedule:
    # 5:30 PM ET / 4:30 PM CT (21:30 UTC). Covers day_end Mon–Fri and monthly on the 1st.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type override: day_end | monthly'
        required: false
        default: ''

jobs:
  agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Detect run type
        run: |
          OVERRIDE="${{ github.event.inputs.run_type }}"
          # Allowlist validation — reject any value that isn't an expected run type
          if [[ "$OVERRIDE" =~ ^(day_end|monthly)$ ]]; then
            echo "RUN_TYPE=$OVERRIDE" >> $GITHUB_ENV
          else
            # First weekday of the month (handles months where 1st falls on Sat/Sun):
            # - day=01 on Mon–Fri → always first weekday
            # - day=02 on Mon     → 1st was Sunday
            # - day=03 on Mon     → 1st was Sat, 2nd was Sun
            DOM=$(date -u +%d | sed 's/^0//')  # strip leading zero for integer compare
            DOW=$(date -u +%u)                  # 1=Mon … 7=Sun
            if [[ "$DOM" -eq 1 && "$DOW" -le 5 ]] || \
               [[ "$DOM" -eq 2 && "$DOW" -eq 1 ]] || \
               [[ "$DOM" -eq 3 && "$DOW" -eq 1 ]]; then
              echo "RUN_TYPE=monthly" >> $GITHUB_ENV
            else
              echo "RUN_TYPE=day_end" >> $GITHUB_ENV
            fi
          fi

      - name: Update portfolio
        env:
          ALPACA_ACCOUNT_NAME: ${{ secrets.ALPACA_ACCOUNT_NAME }}
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
        run: python bot/update.py

      - name: Fetch enrichment
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python bot/enrich.py

      - name: Run agent
        env:
          RUN_TYPE:            ${{ env.RUN_TYPE }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_ACCOUNT_NAME: ${{ secrets.ALPACA_ACCOUNT_NAME }}
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
        run: python bot/agent.py

      - name: Commit results
        run: |
          git config user.name "TradeQuest Bot"
          git config user.email "actions@github.com"
          git add data/portfolio.json data/agent_log.json data/enrichment.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "agent[${{ env.RUN_TYPE }}]: $(date -u +'%Y-%m-%d %H:%M')"
            git push -u origin HEAD
          fi
